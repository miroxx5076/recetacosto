<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f03687">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RecetaCosto">
<link rel="manifest" href="manifest.json">
<title>RecetaCosto</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f9f4;
    --bg2: #ffffff;
    --bg3: #edf5ed;
    --card: #ffffff;
    --border: #c8e0c8;
    --accent: #f03687;
    --accent2: #1b3a1e;
    --accent-dim: #66bb6a;
    --text: #1b3a1e;
    --text2: #4a7050;
    --text3: #7a9e7e;
    --danger: #c0392b;
    --success: #2ecc71;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--accent);
    border-bottom: 1px solid var(--accent2);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: #ffffff;
    letter-spacing: 0.5px;
  }
  .logo span { color: rgba(255,255,255,0.7); font-size: 14px; font-family: 'DM Mono', monospace; display: block; line-height: 1; }

  /* NAV */
  nav {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    padding: 14px 22px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
  }
  .nav-btn.active {
    color: var(--accent2);
    border-bottom-color: var(--accent);
  }
  .nav-btn:hover:not(.active) { color: var(--text2); }

  /* MAIN */
  main { padding: 24px 20px; max-width: 800px; margin: 0 auto; }

  /* SECTIONS */
  .section { display: none; }
  .section.active { display: block; }

  /* TITLES */
  .section-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 26px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .section-sub { color: var(--text3); font-size: 13px; margin-bottom: 24px; font-family: 'DM Mono', monospace; }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--accent2);
  }

  /* FORMS */
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 120px; }
  label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }
  input, select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border .2s;
    width: 100%;
  }
  input:focus, select:focus { border-color: var(--accent-dim); }
  select option { background: var(--bg3); }

  /* BUTTONS */
  .btn {
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 18px;
    transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #ffffff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .btn-outline:hover { border-color: var(--accent-dim); color: var(--accent2); }
  .btn-danger { background: transparent; border: 1px solid #5a2020; color: #e07070; font-size: 12px; padding: 6px 12px; }
  .btn-danger:hover { background: #3a1010; }
  .btn-sm { padding: 6px 14px; font-size: 12px; }
  .btn-icon { background: transparent; border: none; cursor: pointer; color: var(--text3); padding: 4px 8px; font-size: 16px; transition: color .15s; }
  .btn-icon:hover { color: var(--danger); }

  /* TABLE / LIST */
  .list-item {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    transition: background .15s;
  }
  .list-item:last-child { border-bottom: none; }
  .list-item:hover { background: var(--bg3); }
  .list-item-name { flex: 1; font-size: 15px; }
  .list-item-unit { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); background: var(--bg3); padding: 2px 8px; border-radius: 4px; }
  .list-item-price { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--accent2); min-width: 90px; text-align: right; }
  .list-item-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); min-width: 80px; text-align: right; }

  /* RECIPE LINES */
  .recipe-line {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .recipe-line:last-child { border-bottom: none; }
  .recipe-line select { flex: 2; }
  .recipe-line input { flex: 1; }
  .recipe-line .line-cost { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent2); min-width: 80px; text-align: right; }

  /* COST TOTAL */
  .cost-total-box {
    background: var(--bg3);
    border: 1px solid var(--accent-dim);
    border-radius: var(--radius);
    padding: 18px 22px;
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cost-label { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
  .cost-value { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--accent2); }

  /* RECIPE CARDS LIST */
  .recipe-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: border-color .2s;
  }
  .recipe-card:hover { border-color: var(--accent-dim); }
  .recipe-card-name { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); margin-bottom: 4px; }
  .recipe-card-info { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); display: flex; gap: 16px; flex-wrap: wrap; }
  .recipe-card-cost { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--accent2); margin-top: 8px; }
  .recipe-card-actions { display: flex; gap: 8px; margin-top: 12px; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 50px 20px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty p { font-size: 14px; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg3);
    border: 1px solid var(--accent-dim);
    color: var(--text);
    padding: 10px 22px;
    border-radius: 30px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* DIVIDER */
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* RESPONSIVE */
  @media (max-width: 480px) {
    main { padding: 16px 14px; }
    .form-row { flex-direction: column; }
    .list-item-date { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">RecetaCosto <span>Calculadora para recetas</span></div>
</header>

<nav>
  <button class="nav-btn active" onclick="showSection('ingredientes')">🧂 Ingredientes</button>
  <button class="nav-btn" onclick="showSection('nueva-receta')">✏️ Nueva Receta</button>
  <button class="nav-btn" onclick="showSection('recetas')">📋 Mis Recetas</button>
</nav>

<main>
  <!-- INGREDIENTES -->
  <section id="ingredientes" class="section active">
    <div class="section-title">Ingredientes</div>
    <div class="section-sub">Precios base para el cálculo de costos</div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Agregar ingredientes</div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:2">
          <label>Nombre</label>
          <input type="text" id="ing-nombre" placeholder="ej: Harina 000">
        </div>
        <div class="form-group">
          <label>Unidad</label>
          <select id="ing-unidad">
            <option value="kg">kg</option>
            <option value="g">g</option>
            <option value="litro">litro</option>
            <option value="ml">ml</option>
            <option value="unidad">unidad</option>
            <option value="docena">docena</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Precio ($)</label>
          <input type="number" id="ing-precio" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>Fecha actualización</label>
          <input type="date" id="ing-fecha">
        </div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="btn btn-primary" onclick="guardarIngrediente()">Guardar ingrediente</button>
        <span id="ing-edit-id" style="display:none"></span>
        <button class="btn btn-outline btn-sm" id="btn-cancelar-edit" style="display:none" onclick="cancelarEdicion()">Cancelar</button>
      </div>
    </div>

    <div class="card" style="padding:0">
      <div id="lista-ingredientes"></div>
    </div>
  </section>

  <!-- NUEVA RECETA -->
  <section id="nueva-receta" class="section">
    <div class="section-title" id="receta-titulo">Nueva Receta</div>
    <div class="section-sub" id="receta-sub">Combiná ingredientes y calculá el costo</div>
    <div id="banner-edicion" style="display:none; background:#e8f5e9; border:1px solid #a5d6a7; border-radius:8px; padding:10px 16px; margin-bottom:16px; align-items:center; justify-content:space-between; gap:12px;">
      <span style="font-size:13px; color:#2e7d32;">✏️ Editando receta existente</span>
      <button class="btn btn-outline btn-sm" onclick="cancelarEdicionReceta()">Cancelar edición</button>
    </div>

    <div class="card">
      <div class="form-row">
        <div class="form-group" style="flex:2">
          <label>Nombre de la receta</label>
          <input type="text" id="rec-nombre" placeholder="ej: Torta de chocolate">
        </div>
        <div class="form-group">
          <label>Porciones</label>
          <input type="number" id="rec-porciones" placeholder="1" min="1" value="1">
        </div>
      </div>
    </div>

    <div class="card" style="padding:0">
      <div id="lineas-receta"></div>
      <div style="padding:14px 16px; border-top: 1px solid var(--border)">
        <button class="btn btn-outline" onclick="agregarLinea()">+ Agregar ingrediente</button>
      </div>
    </div>

    <div class="cost-total-box">
      <div>
        <div class="cost-label">Costo total de la receta</div>
        <div class="cost-label" id="costo-por-porcion" style="margin-top:4px"></div>
      </div>
      <div class="cost-value" id="costo-total">$0,00</div>
    </div>

    <div style="display:flex;gap:12px;margin-top:20px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="guardarReceta()">💾 Guardar receta</button>
      <button class="btn btn-outline" onclick="limpiarReceta()">Limpiar</button>
    </div>
  </section>

  <!-- MIS RECETAS -->
  <section id="recetas" class="section">
    <div class="section-title">Mis Recetas</div>
    <div class="section-sub">Todas las recetas guardadas con su costo actualizado</div>
    <div id="lista-recetas"></div>
  </section>
</main>

<div id="toast"></div>

<script>
// ===================== STORAGE =====================
const DB = {
  getIngredientes: () => JSON.parse(localStorage.getItem('ingredientes') || '[]'),
  setIngredientes: (data) => localStorage.setItem('ingredientes', JSON.stringify(data)),
  getRecetas: () => JSON.parse(localStorage.getItem('recetas') || '[]'),
  setRecetas: (data) => localStorage.setItem('recetas', JSON.stringify(data)),
};

let editingId = null;

// ===================== UTILS =====================
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function formatPeso(n) {
  return '$' + Number(n).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ===================== NAV =====================
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.currentTarget.classList.add('active');

  if (id === 'nueva-receta') renderLineasReceta();
  if (id === 'recetas') renderRecetas();
}

// ===================== INGREDIENTES =====================
function guardarIngrediente() {
  const nombre = document.getElementById('ing-nombre').value.trim();
  const unidad = document.getElementById('ing-unidad').value;
  const precio = parseFloat(document.getElementById('ing-precio').value);
  const fecha = document.getElementById('ing-fecha').value || today();

  if (!nombre || isNaN(precio) || precio < 0) {
    toast('⚠️ Completá nombre y precio');
    return;
  }

  const lista = DB.getIngredientes();

  if (editingId) {
    const idx = lista.findIndex(i => i.id === editingId);
    if (idx !== -1) lista[idx] = { ...lista[idx], nombre, unidad, precio, fecha };
    editingId = null;
    document.getElementById('ing-edit-id').style.display = 'none';
    document.getElementById('btn-cancelar-edit').style.display = 'none';
    toast('✅ Ingrediente actualizado');
  } else {
    lista.push({ id: uid(), nombre, unidad, precio, fecha });
    toast('✅ Ingrediente guardado');
  }

  DB.setIngredientes(lista);
  limpiarFormIngrediente();
  renderIngredientes();
}

function limpiarFormIngrediente() {
  document.getElementById('ing-nombre').value = '';
  document.getElementById('ing-precio').value = '';
  document.getElementById('ing-fecha').value = '';
  document.getElementById('ing-unidad').value = 'kg';
}

function cancelarEdicion() {
  editingId = null;
  limpiarFormIngrediente();
  document.getElementById('ing-edit-id').style.display = 'none';
  document.getElementById('btn-cancelar-edit').style.display = 'none';
}

function editarIngrediente(id) {
  const ing = DB.getIngredientes().find(i => i.id === id);
  if (!ing) return;
  editingId = id;
  document.getElementById('ing-nombre').value = ing.nombre;
  document.getElementById('ing-unidad').value = ing.unidad;
  document.getElementById('ing-precio').value = ing.precio;
  document.getElementById('ing-fecha').value = ing.fecha;
  document.getElementById('btn-cancelar-edit').style.display = 'inline-block';
  document.getElementById('ing-nombre').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  toast('✏️ Editando: ' + ing.nombre);
}

function eliminarIngrediente(id) {
  if (!confirm('¿Eliminar este ingrediente? Las recetas que lo usen quedarán sin precio.')) return;
  const lista = DB.getIngredientes().filter(i => i.id !== id);
  DB.setIngredientes(lista);
  renderIngredientes();
  toast('🗑️ Eliminado');
}

function renderIngredientes() {
  const lista = DB.getIngredientes();
  const container = document.getElementById('lista-ingredientes');
  if (!lista.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🧂</div><p>No hay ingredientes aún.<br>Agregá el primero arriba.</p></div>`;
    return;
  }
  container.innerHTML = lista.map(i => `
    <div class="list-item">
      <span class="list-item-name">${i.nombre}</span>
      <span class="list-item-unit">${i.unidad}</span>
      <span class="list-item-price">${formatPeso(i.precio)}</span>
      <span class="list-item-date">${i.fecha}</span>
      <button class="btn-icon" title="Editar" onclick="editarIngrediente('${i.id}')">✏️</button>
      <button class="btn-icon" title="Eliminar" onclick="eliminarIngrediente('${i.id}')">🗑️</button>
    </div>
  `).join('');
}

// ===================== RECETA - LÍNEAS =====================
let lineas = [];

function agregarLinea() {
  lineas.push({ id: uid(), ingId: '', cantidad: '' });
  renderLineasReceta();
}

function renderLineasReceta() {
  const ingredientes = DB.getIngredientes();
  const container = document.getElementById('lineas-receta');

  if (!ingredientes.length) {
    container.innerHTML = `<div class="empty"><p>Primero cargá ingredientes en la pestaña 🧂</p></div>`;
    calcularCostoTotal();
    return;
  }

  if (!lineas.length) lineas = [{ id: uid(), ingId: '', cantidad: '' }];

  const opciones = ingredientes.map(i =>
    `<option value="${i.id}">${i.nombre} (${i.unidad})</option>`
  ).join('');

  container.innerHTML = lineas.map((l, idx) => {
    const ingSelec = ingredientes.find(i => i.id === l.ingId);
    const costLinea = ingSelec && l.cantidad ? ingSelec.precio * parseFloat(l.cantidad) : 0;
    return `
      <div class="recipe-line" data-idx="${idx}">
        <select style="flex:2" onchange="actualizarLinea(${idx},'ingId',this.value)">
          <option value="">-- Elegí un ingrediente --</option>
          ${ingredientes.map(i => `<option value="${i.id}" ${i.id === l.ingId ? 'selected' : ''}>${i.nombre} (${i.unidad})</option>`).join('')}
        </select>
        <input type="number" style="flex:1; min-width:70px" placeholder="Cantidad" min="0" step="any"
          value="${l.cantidad}" onchange="actualizarLinea(${idx},'cantidad',this.value)">
        <span class="line-cost">${costLinea > 0 ? formatPeso(costLinea) : '—'}</span>
        <button class="btn-icon" onclick="quitarLinea(${idx})">✕</button>
      </div>
    `;
  }).join('');

  calcularCostoTotal();
}

function actualizarLinea(idx, campo, val) {
  lineas[idx][campo] = val;
  renderLineasReceta();
}

function quitarLinea(idx) {
  lineas.splice(idx, 1);
  if (!lineas.length) lineas = [{ id: uid(), ingId: '', cantidad: '' }];
  renderLineasReceta();
}

function calcularCostoTotal() {
  const ingredientes = DB.getIngredientes();
  let total = 0;
  lineas.forEach(l => {
    const ing = ingredientes.find(i => i.id === l.ingId);
    if (ing && l.cantidad) total += ing.precio * parseFloat(l.cantidad);
  });
  const porciones = parseInt(document.getElementById('rec-porciones')?.value) || 1;
  document.getElementById('costo-total').textContent = formatPeso(total);
  document.getElementById('costo-por-porcion').textContent =
    porciones > 1 ? `${formatPeso(total / porciones)} por porción` : '';
  return total;
}

document.addEventListener('input', e => {
  if (e.target.id === 'rec-porciones') calcularCostoTotal();
});

function limpiarReceta() {
  editandoRecetaId = null;
  document.getElementById('rec-nombre').value = '';
  document.getElementById('rec-porciones').value = '1';
  document.getElementById('receta-titulo').textContent = 'Nueva Receta';
  document.getElementById('receta-sub').textContent = 'Combiná ingredientes y calculá el costo';
  document.getElementById('banner-edicion').style.display = 'none';
  lineas = [{ id: uid(), ingId: '', cantidad: '' }];
  renderLineasReceta();
}

// ===================== GUARDAR RECETA =====================
let editandoRecetaId = null;

function editarReceta(id) {
  const recetas = DB.getRecetas();
  const r = recetas.find(x => x.id === id);
  if (!r) return;

  editandoRecetaId = id;
  lineas = r.lineas.map(l => ({ ...l }));

  // Ir a la pestaña
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nueva-receta').classList.add('active');
  document.querySelectorAll('.nav-btn')[1].classList.add('active');

  document.getElementById('rec-nombre').value = r.nombre;
  document.getElementById('rec-porciones').value = r.porciones;
  document.getElementById('receta-titulo').textContent = 'Editar Receta';
  document.getElementById('receta-sub').textContent = 'Modificá los ingredientes o cantidades';
  document.getElementById('banner-edicion').style.display = 'flex';

  renderLineasReceta();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  toast('✏️ Editando: ' + r.nombre);
}

function cancelarEdicionReceta() {
  editandoRecetaId = null;
  document.getElementById('receta-titulo').textContent = 'Nueva Receta';
  document.getElementById('receta-sub').textContent = 'Combiná ingredientes y calculá el costo';
  document.getElementById('banner-edicion').style.display = 'none';
  limpiarReceta();
}

function guardarReceta() {
  const nombre = document.getElementById('rec-nombre').value.trim();
  if (!nombre) { toast('⚠️ Poné un nombre a la receta'); return; }

  const lineasValidas = lineas.filter(l => l.ingId && l.cantidad);
  if (!lineasValidas.length) { toast('⚠️ Agregá al menos un ingrediente con cantidad'); return; }

  const porciones = parseInt(document.getElementById('rec-porciones').value) || 1;
  const costo = calcularCostoTotal();

  const recetas = DB.getRecetas();

  if (editandoRecetaId) {
    const idx = recetas.findIndex(r => r.id === editandoRecetaId);
    if (idx !== -1) {
      recetas[idx] = { ...recetas[idx], nombre, porciones, lineas: lineasValidas, costo, fecha: today() };
    }
    DB.setRecetas(recetas);
    toast('✅ Receta actualizada: ' + nombre);
    cancelarEdicionReceta();
  } else {
    const receta = { id: uid(), nombre, porciones, lineas: lineasValidas, costo, fecha: today() };
    recetas.push(receta);
    DB.setRecetas(recetas);
    toast('✅ Receta guardada: ' + nombre);
    limpiarReceta();
  }
}

// ===================== MIS RECETAS =====================
function renderRecetas() {
  const recetas = DB.getRecetas();
  const ingredientes = DB.getIngredientes();
  const container = document.getElementById('lista-recetas');

  if (!recetas.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>No hay recetas guardadas aún.</p></div>`;
    return;
  }

  container.innerHTML = recetas.map(r => {
    // Recalcular costo con precios actuales
    let costoActual = 0;
    r.lineas.forEach(l => {
      const ing = ingredientes.find(i => i.id === l.ingId);
      if (ing && l.cantidad) costoActual += ing.precio * parseFloat(l.cantidad);
    });
    const porPorcion = r.porciones > 1 ? ` · ${formatPeso(costoActual / r.porciones)} /porción` : '';
    return `
      <div class="recipe-card">
        <div class="recipe-card-name">${r.nombre}</div>
        <div class="recipe-card-info">
          <span>${r.lineas.length} ingredientes</span>
          <span>${r.porciones} porción${r.porciones > 1 ? 'es' : ''}</span>
          <span>guardada ${r.fecha}</span>
        </div>
        <div class="recipe-card-cost">${formatPeso(costoActual)}${porPorcion}</div>
        <div class="recipe-card-actions">
          <button class="btn btn-outline btn-sm" onclick="verDetalle('${r.id}')">Ver detalle</button>
          <button class="btn btn-outline btn-sm" onclick="editarReceta('${r.id}')">✏️ Editar</button>
          <button class="btn btn-danger btn-sm" onclick="eliminarReceta('${r.id}')">Eliminar</button>
        </div>
      </div>
    `;
  }).join('');
}

function verDetalle(id) {
  const recetas = DB.getRecetas();
  const ingredientes = DB.getIngredientes();
  const r = recetas.find(x => x.id === id);
  if (!r) return;

  let costoTotal = 0;
  const lineasHtml = r.lineas.map(l => {
    const ing = ingredientes.find(i => i.id === l.ingId);
    const nombre = ing ? ing.nombre : '(eliminado)';
    const unidad = ing ? ing.unidad : '';
    const costo = ing ? ing.precio * parseFloat(l.cantidad) : 0;
    costoTotal += costo;
    return `
      <div class="list-item">
        <span class="list-item-name">${nombre}</span>
        <span class="list-item-unit">${l.cantidad} ${unidad}</span>
        <span class="list-item-price">${formatPeso(costo)}</span>
      </div>
    `;
  }).join('');

  const modal = document.createElement('div');
  modal.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px`;
  modal.innerHTML = `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:500px;overflow:hidden">
      <div style="padding:20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <div style="font-family:'Playfair Display',serif;font-size:20px">${r.nombre}</div>
        <button class="btn-icon" onclick="this.closest('[style*=fixed]').remove()">✕</button>
      </div>
      <div>${lineasHtml}</div>
      <div style="padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text3)">COSTO TOTAL${r.porciones > 1 ? ' · ' + r.porciones + ' porciones' : ''}</span>
        <span style="font-family:'Playfair Display',serif;font-size:24px;color:var(--accent2)">${formatPeso(costoTotal)}</span>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}

function eliminarReceta(id) {
  if (!confirm('¿Eliminar esta receta?')) return;
  DB.setRecetas(DB.getRecetas().filter(r => r.id !== id));
  renderRecetas();
  toast('🗑️ Receta eliminada');
}

// ===================== INIT =====================
document.getElementById('ing-fecha').value = today();
renderIngredientes();
</script>
</body>
